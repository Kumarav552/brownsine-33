<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Savings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="add">
  <div class="page-shell dashboard-shell">
    <div class="floating-orbs orb-a"></div>
    <div class="floating-orbs orb-c"></div>

    <main class="dashboard-page app-dashboard">
      <section class="phone-card page-card app-phone">
        <div class="app-meta-bar">
          <span class="eyebrow">Add Savings</span>
          <div class="top-actions">
            <div id="statusBadge" class="status-badge logged-in">Logged in</div>
            <button id="logoutButton" class="mini-action" type="button">Logout</button>
          </div>
        </div>

        <div class="screen-header">
          <a class="back-button link-chip" href="home.html">&lt;</a>
          <h4>Select Date</h4>
          <span class="sparkle">+</span>
        </div>

        <div class="calendar-card">
          <div class="calendar-month">
            <button type="button" id="prevMonthButton">&lt;</button>
            <strong id="calendarMonthLabel">April 2026</strong>
            <button type="button" id="nextMonthButton">&gt;</button>
          </div>
          <div class="weekdays">
            <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
          </div>
          <div id="calendarDays" class="days-grid"></div>
        </div>

        <form id="savingsForm" class="add-form">
          <h4>Add Savings</h4>
          <p id="formMessage" class="form-message" aria-live="polite"></p>

          <label>
            <span>Selected Date</span>
            <input id="selectedDate" type="text" value="24 April 2026" readonly>
          </label>

          <label>
            <span>Amount</span>
            <input id="amountInput" type="text" inputmode="numeric" value="500" placeholder="Enter amount like 100 or 200 rs" required>
          </label>

          <div class="amount-chips">
            <button type="button" class="amount-chip" data-amount="100">+ ₹100</button>
            <button type="button" class="amount-chip" data-amount="200">+ ₹200</button>
            <button type="button" class="amount-chip" data-amount="500">+ ₹500</button>
          </div>

          <label>
            <span>Note (Optional)</span>
            <input id="noteInput" type="text" value="Saved from pocket money" placeholder="Saved from pocket money">
          </label>

          <button id="saveButton" type="button" class="primary-button compact">Save and Continue</button>
        </form>

        <nav class="bottom-nav">
          <a class="nav-item" href="home.html">Home</a>
          <a class="nav-item active" href="add.html">Save</a>
          <a class="nav-item" href="history.html">History</a>
          <a class="nav-item" href="profile.html">Profile</a>
        </nav>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>

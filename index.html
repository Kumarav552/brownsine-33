<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aishu Smart Savings Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <div class="page-shell login-shell">
    <div class="floating-orbs orb-a"></div>
    <div class="floating-orbs orb-b"></div>
    <div class="floating-orbs orb-c"></div>

    <main class="dashboard-page app-dashboard">
      <section class="login-panel app-phone login-phone">
        <div class="app-meta-bar">
          <span class="eyebrow">Login</span>
          <div class="brand-pill">Smart Savings</div>
        </div>

        <div class="login-hero-icon">
          <div class="coin coin-left">&#8377;</div>
          <div class="coin coin-right">&#8377;</div>
          <div class="piggy-badge">SS</div>
        </div>

        <div class="login-copy">
          <h2>Welcome Back Aishu </h2>
          <p class="panel-subtitle">Sign in to continue tracking your savings, progress, and daily goals.</p>
        </div>

        <div class="quote-box login-quote">
          <span class="quote-mark">"</span>
          <p>Small savings today become strong habits tomorrow.</p>
          <span class="quote-mark">"</span>
        </div>

        <form id="loginForm" class="login-form">
          <p id="loginMessage" class="form-message"></p>

          <label class="input-wrap">
            <span class="input-icon">@</span>
            <input id="email" type="email" placeholder="Email" value="hello@smartsave.app" required>
          </label>

          <label class="input-wrap">
            <span class="input-icon">*</span>
            <input id="password" type="password" placeholder="Password" value="12345678" required>
            <button id="togglePassword" type="button" class="ghost-icon" aria-label="Toggle password visibility">Show</button>
          </label>

          <button type="button" class="link-button">Forgot Password?</button>
          <button type="submit" class="primary-button">Sign In</button>

          <div class="divider"><span>OR</span></div>

          <button id="googleLoginButton" type="button" class="google-button">
            <span class="google-mark">G</span>
            Continue with Google
          </button>

          <p class="signup-line">Don't have an account? <button type="button" class="inline-link">Sign Up</button></p>
        </form>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
